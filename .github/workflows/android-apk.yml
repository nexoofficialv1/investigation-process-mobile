name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          flutter create . --platforms=android
          rm -rf test

      - name: Enable translation and speech permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text(encoding='utf-8')

          permissions = [
              '<uses-permission android:name="android.permission.RECORD_AUDIO"/>',
              '<uses-permission android:name="android.permission.INTERNET"/>',
              '<uses-permission android:name="android.permission.BLUETOOTH"/>',
              '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>',
              '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>',
          ]

          opening = re.search(r'<manifest[^>]*>', text)
          if opening is None:
              raise SystemExit('Android manifest opening tag not found')

          missing = [item for item in permissions if item not in text]
          if missing:
              insertion = '\n    ' + '\n    '.join(missing)
              text = text[:opening.end()] + insertion + text[opening.end():]

          query_block = (
              '\n    <queries>\n'
              '        <intent>\n'
              '            <action android:name="android.speech.RecognitionService" />\n'
              '        </intent>\n'
              '    </queries>\n'
          )
          if 'android.speech.RecognitionService' not in text:
              text = text.replace('    <application', query_block + '\n    <application', 1)

          path.write_text(text, encoding='utf-8')
          print(path.read_text(encoding='utf-8'))
          PY


      - name: Disable Impeller renderer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("android/app/src/main/AndroidManifest.xml")
          text = path.read_text(encoding="utf-8")

          metadata = (
              '        <meta-data\n'
              '            android:name="io.flutter.embedding.android.EnableImpeller"\n'
              '            android:value="false" />'
          )

          if "io.flutter.embedding.android.EnableImpeller" not in text:
              match = re.search(r"<application\b[^>]*>", text, re.DOTALL)
              if match is None:
                  raise SystemExit("AndroidManifest.xml application tag not found")
              text = text[:match.end()] + "\n" + metadata + text[match.end():]
              path.write_text(text, encoding="utf-8")

          print("Impeller disabled in AndroidManifest.xml")
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-shrink
        uses: actions/upload-artifact@v4
        with:
          name: investigation-process-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
