name: Build NEXO Ride Android AAB

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Live NEXO Ride URL, example: https://your-domain.com/app/?v=136v37"
        required: true
        default: "https://your-nexo-ride-server.example.com/app/?v=136v37"

jobs:
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Prepare Android wrapper
        working-directory: android_build_prep
        run: |
          cp package.android-wrapper.json package.json
          npm install
          npm install -D typescript
          cat > capacitor.config.ts <<CONFIG
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.astratechnologies.nexoride',
            appName: 'NEXO Ride',
            webDir: 'web',
            server: { url: '${{ inputs.server_url }}', cleartext: false }
          };
          export default config;
          CONFIG
          npx cap add android
          npx cap sync android
      - name: Build release AAB
        working-directory: android_build_prep/android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXO-Ride-v1-0-36-AAB
          path: android_build_prep/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
